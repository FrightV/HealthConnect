<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="">
<head>
    <title>Cadastro de Paciente</title>
</head>
<body>

<h2>Cadastro de Paciente</h2>

<form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">

    <input type="hidden" th:field="*{id}" />

    Nome: <input type="text" th:field="*{nome}" /><br><br>

    <label>CPF:</label>
    <input type="text" th:field="*{cpf}">
    <span th:if="${#fields.hasErrors('cpf')}"
          th:errors="*{cpf}"
          style="color:red"></span>
    <br><br>


    Telefone: <input type="text" th:field="*{telefone}" /><br><br>
    Email: <input type="email" th:field="*{email}" /><br><br>

    <label>CEP:</label>
    <input type="text" th:field="*{cep}" id="cep" placeholder="Exemplo: 12345678910">
    <button type="button" onclick="buscarCep()">Buscar CEP</button>

    <br>

    <label>Rua:</label>
    <input type="text" th:field="*{logradouro}" id="logradouro">

    <br>

    <label>Número:</label>
    <input type="text" th:field="*{numero}">

    <br>

    <label>Bairro:</label>
    <input type="text" th:field="*{bairro}" id="bairro">

    <br>

    <label>Cidade:</label>
    <input type="text" th:field="*{cidade}" id="cidade">

    <br>

    <label>Estado:</label>
    <input type="text" th:field="*{estado}" id="estado">

    <br>

    <button type="submit">Salvar</button>

</form>

<br>
<a th:href="@{/pacientes}">Voltar</a>

</body>
</html>

<script>
    function buscarCep() {

        let cep = document.getElementById("cep").value;

        fetch("https://viacep.com.br/ws/" + cep + "/json/")
            .then(response => response.json())
            .then(data => {

                document.getElementById("logradouro").value = data.logradouro;
                document.getElementById("bairro").value = data.bairro;
                document.getElementById("cidade").value = data.localidade;
                document.getElementById("estado").value = data.uf;

            })
            .catch(error => console.log("Erro ao buscar CEP"));
    }
</script>
